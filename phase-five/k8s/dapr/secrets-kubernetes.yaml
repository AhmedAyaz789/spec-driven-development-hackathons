apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kubernetes-secrets
spec:
  type: secretstores.kubernetes
  version: v1
  metadata:
    # Default behavior
    - name: namespace
      value: "default"  # Change to your deployment namespace
---
# Example secrets for Phase V deployment
apiVersion: v1
kind: Secret
metadata:
  name: phase-v-secrets
type: Opaque
stringData:
  # Database credentials
  db-user: "todouser"
  db-password: "todopass"
  db-host: "postgres"
  db-name: "tododb"

  # Kafka credentials (if authentication enabled)
  kafka-username: "kafka-user"
  kafka-password: "kafka-password"

  # API keys and tokens
  jwt-secret: "your-jwt-secret-key-change-in-production"
  api-key: "your-api-key-change-in-production"
---
# Service Account for Dapr to read Kubernetes secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dapr-app-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dapr-secrets-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dapr-read-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dapr-secrets-reader
subjects:
  - kind: ServiceAccount
    name: dapr-app-sa
