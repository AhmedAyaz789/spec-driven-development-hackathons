---
# External Secrets configuration for production
# Supports: HashiCorp Vault, AWS Secrets Manager, Azure Key Vault, Google Secret Manager

apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    name: external-secrets

---
# External Secrets Operator (ESO) SecretStore for HashiCorp Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: todo-system
spec:
  provider:
    vault:
      server: "https://vault.example.com:8200"
      path: "secret"
      version: "v2"
      # Authentication method
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "todo-app"
          serviceAccountRef:
            name: vault-sa

---
# Dapr SecretStore component pointing to Vault
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: vault-secrets
spec:
  type: secretstores.vault
  version: v1
  metadata:
    - name: vaultAddr
      value: "https://vault.example.com:8200"
    - name: vaultToken
      secretKeyRef:
        name: vault-token
        key: token
    - name: vaultPath
      value: "secret/data"

---
# ExternalSecret to fetch database credentials from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: todo-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: postgres-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        connectionString: "{{ .username | base64enc }}:{{ .password | base64enc }}"
  data:
    - secretKey: username
      remoteRef:
        key: postgres
        property: username
    - secretKey: password
      remoteRef:
        key: postgres
        property: password

---
# ExternalSecret for Kafka credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kafka-credentials
  namespace: todo-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: kafka-secrets
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: kafka
        property: username
    - secretKey: password
      remoteRef:
        key: kafka
        property: password

---
# ExternalSecret for JWT secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-secret
  namespace: todo-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: jwt-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: jwt
        property: secret

---
# ExternalSecret for API keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-keys
  namespace: todo-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: api-key-secrets
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: api
        property: key

---
# Service Account for Vault authentication
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-sa
  namespace: todo-system

---
# RBAC for vault-sa
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-role
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-role
subjects:
  - kind: ServiceAccount
    name: vault-sa
    namespace: todo-system

