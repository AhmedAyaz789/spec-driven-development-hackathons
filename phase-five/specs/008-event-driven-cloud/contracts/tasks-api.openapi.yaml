openapi: 3.0.0
info:
  title: Todo Tasks API (Phase V Enhanced)
  description: RESTful API for advanced todo task management with recurring tasks, reminders, priorities, and tags
  version: 2.0.0
  contact:
    name: Phase V Team

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.production.example.com
    description: Production

paths:
  /users/{user_id}/tasks:
    post:
      summary: Create a new task
      operationId: createTask
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The user ID (UUID)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '422':
          description: Validation error
    get:
      summary: List tasks for a user with filtering and sorting
      operationId: listTasks
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The user ID (UUID)
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [created_at, due_at, priority, updated_at]
            default: created_at
          description: Field to sort by
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction
        - name: priority
          in: query
          required: false
          schema:
            type: string
            enum: [low, medium, high]
          description: Filter by priority
        - name: tags
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated tags to filter by (any match)
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Search in title and description
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
          description: Page size
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Page offset
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          description: Unauthorized

  /users/{user_id}/tasks/{task_id}:
    get:
      summary: Get a specific task
      operationId: getTask
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          description: Unauthorized
        '404':
          description: Task not found

    patch:
      summary: Update a task
      operationId: updateTask
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          description: Unauthorized
        '404':
          description: Task not found
        '422':
          description: Validation error

    delete:
      summary: Delete a task
      operationId: deleteTask
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Task deleted
        '401':
          description: Unauthorized
        '404':
          description: Task not found

components:
  schemas:
    RecurrenceRule:
      type: object
      description: Recurrence configuration for tasks
      properties:
        frequency:
          type: string
          enum: [daily, weekly, monthly]
          description: Recurrence frequency
        end_date:
          type: string
          format: date
          description: Optional end date for recurrence
      required:
        - frequency

    TaskCreateRequest:
      type: object
      description: Request body for creating a task
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Task title
        description:
          type: string
          nullable: true
          description: Optional task description
        due_at:
          type: string
          format: date-time
          nullable: true
          description: Optional due date and time
        remind_at:
          type: string
          format: date-time
          nullable: true
          description: Optional reminder time
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
          description: Task priority
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 50
          description: Optional tags/labels
        recurrence_rule:
          $ref: '#/components/schemas/RecurrenceRule'
          nullable: true
          description: Optional recurrence configuration
      required:
        - title

    TaskUpdateRequest:
      type: object
      description: Request body for updating a task (all fields optional)
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        is_completed:
          type: boolean
        due_at:
          type: string
          format: date-time
          nullable: true
        remind_at:
          type: string
          format: date-time
          nullable: true
        priority:
          type: string
          enum: [low, medium, high]
        tags:
          type: array
          items:
            type: string
        recurrence_rule:
          $ref: '#/components/schemas/RecurrenceRule'
          nullable: true

    TaskResponse:
      type: object
      description: Complete task representation
      properties:
        id:
          type: string
          format: uuid
          description: Unique task identifier
        user_id:
          type: string
          format: uuid
          description: Owner user ID
        title:
          type: string
        description:
          type: string
          nullable: true
        is_completed:
          type: boolean
        due_at:
          type: string
          format: date-time
          nullable: true
        remind_at:
          type: string
          format: date-time
          nullable: true
        priority:
          type: string
          enum: [low, medium, high]
        tags:
          type: array
          items:
            type: string
        recurrence_rule:
          $ref: '#/components/schemas/RecurrenceRule'
          nullable: true
        next_occurrence_at:
          type: string
          format: date-time
          nullable: true
          description: For recurring tasks, when next occurrence is scheduled
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - user_id
        - title
        - is_completed
        - created_at
        - updated_at

    TaskListResponse:
      type: object
      description: Paginated list of tasks
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskResponse'
        total:
          type: integer
          description: Total number of tasks matching filters
        limit:
          type: integer
        offset:
          type: integer

    ErrorResponse:
      type: object
      description: Standard error response
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code identifier
            message:
              type: string
              description: Human-readable error message
            details:
              type: object
              nullable: true
              description: Additional error details

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from authentication

security:
  - BearerAuth: []
