version: '3.8'

services:
  # Frontend Next.js Application
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: task-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_KAFKA_UI_URL=http://kafka-ui:8080
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - task-network
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://task_user:task_password@db:5432/task_db
      - SECRET_KEY=your-super-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TASK_EVENTS_TOPIC=task-events
      - KAFKA_REMINDER_EVENTS_TOPIC=reminder-events
      - KAFKA_RECURRING_TASK_EVENTS_TOPIC=recurring-task-events
      - REDIS_URL=redis://redis:6379
      - DAPR_APP_ID=task-backend
      - DAPR_HTTP_PORT=3500
      - DAPR_GRPC_PORT=50001
    depends_on:
      - db
      - kafka
      - redis
    networks:
      - task-network
    command: [
      "dapr", "run",
      "--app-id", "task-backend",
      "--app-port", "8000",
      "--dapr-http-port", "3500",
      "--dapr-grpc-port", "50001",
      "--components-path", "./dapr/components",
      "--config", "./dapr/config/config.yaml",
      "--log-level", "info",
      "--", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"
    ]
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: task-db
    environment:
      - POSTGRES_DB=task_db
      - POSTGRES_USER=task_user
      - POSTGRES_PASSWORD=task_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - task-network
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: task-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - task-network
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Kafka for Event Streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: task-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - task-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: task-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    depends_on:
      - zookeeper
    networks:
      - task-network
    restart: unless-stopped

  # Kafka Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: task-schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:9092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      - kafka
    networks:
      - task-network
    restart: unless-stopped

  # Kafka UI for monitoring
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: task-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_SCHEMAREGISTRYURL: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: first
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    depends_on:
      - kafka
      - schema-registry
    networks:
      - task-network
    restart: unless-stopped

  # Kafka Connect for integration
  kafka-connect:
    image: confluentinc/cp-kafka-connect:latest
    container_name: task-kafka-connect
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: kafka-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: docker-connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: docker-connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: docker-connect-status
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      - kafka
      - schema-registry
    networks:
      - task-network
    restart: unless-stopped

  # Dapr Placement Service
  dapr-placement:
    image: daprio/dapr:latest
    container_name: dapr-placement
    ports:
      - "50005:50005"
    command: ["./placement", "-port", "50005", "-log-level", "info"]
    networks:
      - task-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  task-network:
    driver: bridge